<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signin-box {
            width: 360px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            color: #fff;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #ddd;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -10px;
            font-size: 12px;
            color: #ffcccb;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff4b5c;
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
        }

        #errorMsg {
            color: yellow;
            text-align: center;
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="signin-box">
    <h2>Sign Up</h2>
    <p>Please sign up to continue</p>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="name" required>
            <label>Name</label>
        </div>

        <div class="input-group">
            <input type="email" id="email" required>
            <label>Email</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" required>
            <label>Password</label>
        </div>

        <p id="errorMsg"></p>

        <button type="submit">Sign Up</button>
    </form>
</div>

<!-- ✅ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://zrgvxxbdevcwkpohckwj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyZ3Z4eGJkZXZjd2twb2hja3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzAwNzgsImV4cCI6MjA5MjI0NjA3OH0.-js43IF_QQk7793-AqP6aSV2VbyWiZWj9SH5tprYjJs"; 
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("errorMsg");

    errorEl.style.display = "none";

    if (!name || !email || !password) {
        errorEl.textContent = "Please fill in all fields";
        errorEl.style.display = "block";
        return;
    }

    try {
        const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: {
                data: {
                    name: name
                }
            }
        });

        if (error) {
            errorEl.textContent = "Error signing up: " + error.message;
            errorEl.style.display = "block";
            return;
        }

        // ✅ success
        alert("Sign up successful! Please check your email to confirm.");
        // Redirect to login or main page
        window.location.href = "index.html";

    } catch (err) {
        errorEl.textContent = "An error occurred: " + err.message;
        errorEl.style.display = "block";
    }
});
</script>

</body>
</html>
