<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up - FuelFinder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: backgroundShift 10s ease-in-out infinite;
        }

        @keyframes backgroundShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .signin-box {
            width: 90%;
            max-width: 360px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .signin-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        p {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-bottom-color: #ff6b6b;
        }

        .input-group label {
            position: absolute;
            top: 12px;
            left: 0;
            color: #ddd;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .input-group input:focus~label,
        .input-group input:valid~label {
            top: -10px;
            font-size: 12px;
            color: #ff6b6b;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: linear-gradient(45deg, #ffa500, #ff6b6b);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #errorMsg {
            color: #ff6b6b;
            text-align: center;
            display: none;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .link a:hover {
            color: #ff6b6b;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .signin-box {
                padding: 30px 20px;
            }

            h2 {
                font-size: 24px;
            }

            .input-group input {
                font-size: 14px;
            }

            button {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="signin-box">
        <h2>Sign Up</h2>
        <p>Create your account to get started</p>

        <form id="signupForm">
            <div class="input-group">
                <input type="text" id="name" required>
                <label>Name</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>

            <p id="errorMsg"></p>

            <button type="submit">Sign Up</button>
        </form>

        <div class="link">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://zrgvxxbdevcwkpohckwj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyZ3Z4eGJkZXZjd2twb2hja3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzAwNzgsImV4cCI6MjA5MjI0NjA3OH0.-js43IF_QQk7793-AqP6aSV2VbyWiZWj9SH5tprYjJs";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorEl = document.getElementById("errorMsg");

            errorEl.style.display = "none";

            if (!name || !email || !password) {
                errorEl.textContent = "Please fill in all fields";
                errorEl.style.display = "block";
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            name: name
                        }
                    }
                });

                if (error) {
                    errorEl.textContent = "Error signing up: " + error.message;
                    errorEl.style.display = "block";
                    return;
                }

                // Success
                alert("Sign up successful! Please check your email to confirm.");
                // Redirect to login
                window.location.href = "login.html";

            } catch (err) {
                errorEl.textContent = "An error occurred: " + err.message;
                errorEl.style.display = "block";
            }
        });
    </script>

</body>

</html>
